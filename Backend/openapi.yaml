openapi: 3.0.3
info:
  title: HITCON 2026 NFC Tag Game API
  version: 1.0.0
  description: |
    OpenAPI specification for the HITCON 2026 NFC Tag Game.

    This file is intended to be the canonical backend API contract. It captures
    the API surface, authentication model, NFC trust model, error semantics,
    request/response examples, and staff-only validation flow.

    Authentication and identity rules:
    - Every authenticated request must send the conference SSO JWT in the
      `Authorization: Bearer <SSO_JWT_Token>` header.
    - Backend identity key is always JWT claim `sub`, usually a hash of the
      KKTIX ID.
    - Frontend-provided user IDs are never trusted for caller identity.

    Required JWT claims:
    - `sub` is required. Requests without `sub` must be rejected as 401.
    - `exp` is required. Expired tokens must be rejected.
    - `iss` is required and must match the configured SSO issuer.
    - `aud` is required and must match this API's configured audience.
    - `role` is required for staff-only APIs and must be `STAFF`.

    NFC tag URL and redirect entry:
    - Physical tags store URLs like `https://game.hitcon2026.online/b?u={user_id}`.
    - `/b` is a redirect entry for the scan flow and is outside the authenticated
      `/v1` API surface.
    - The `u` query parameter is untrusted input from the physical tag. It must
      be verified against the scanned physical UID during `POST /collections/scan`.

    Unified error handling:
    Frontend applications should handle 401, 403, 404, and 409 responses in an
    API interceptor and present UI based on the returned `code`.

    Design philosophy:
    - Identity source: Backend identity is derived only from JWT `sub`;
      client-supplied user IDs are untrusted for caller identity.
    - NFC trust model: Tag URL `u` values are untrusted and must be verified
      against the physical NFC UID on scan.
    - Anti-forgery: A mismatch between target user id and physical UID is
      treated as a replay attack or cloned tag.
    - Lazy profile creation: `GET /users/me` creates a default profile
      automatically when the authenticated JWT subject is new.
    - Client storage: Scan responses provide enough target data for the app to
      update local app storage after server-side verification.

    Example JWT payload:

    ```json
    {
      "sub": "kktix_hash_abc123",
      "iss": "https://sso.hitcon2026.online",
      "aud": "hitcon-nfc-tag-game-api",
      "exp": 1786242000,
      "role": "ATTENDEE"
    }
    ```
servers:
  - url: https://game.hitcon2026.online/v1
    description: Production
  - url: https://{devHost}/v1
    description: Development
    variables:
      devHost:
        default: localhost
        description: ngrok or local development domain
security:
  - bearerAuth: []
tags:
  - name: Redirect
    description: Redirect entry outside authenticated /v1 API surface
  - name: Users
  - name: Tags
  - name: Collections
  - name: Missions
  - name: Scoreboard
  - name: Staff
paths:
  /b:
    get:
      tags: [Redirect]
      summary: Redirect entry for scanned NFC tag URL
      description: |
        Redirect flow entry for links like `https://game.hitcon2026.online/b?u={user_id}`.
        This endpoint is outside authenticated `/v1` APIs.
      servers:
        - url: https://game.hitcon2026.online
          description: Production redirect host
        - url: https://{devHost}
          description: Development redirect host
          variables:
            devHost:
              default: localhost
              description: ngrok or local development domain
      security: []
      parameters:
        - in: query
          name: u
          required: true
          schema:
            type: string
          description: Target user id encoded in NFC tag URL (untrusted input)
          example: U_9V8W7X
      responses:
        '302':
          description: Redirect to app route
        '400':
          description: Invalid query parameter
  /users/me:
    get:
      tags: [Users]
      summary: Initialize or get my profile
      description: |
        Lazy initialization endpoint. If `sub` from the JWT does not exist in
        the database, the backend creates a default profile automatically.
      responses:
        '200':
          description: Profile loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyProfileResponse'
              examples:
                profile:
                  $ref: '#/components/examples/GetMyProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Users]
      summary: Update my profile
      description: Updates the authenticated user's profile. All request fields are optional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMyProfileRequest'
            examples:
              update:
                $ref: '#/components/examples/UpdateMyProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
              examples:
                updated:
                  value:
                    status: success
                    message: Profile updated.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /users/{target_id}/collection:
    get:
      tags: [Users]
      summary: View another user's collection
      description: Returns another user's public collection by target user id.
      parameters:
        - in: path
          name: target_id
          required: true
          schema:
            type: string
          example: U_1X2Y3Z
      responses:
        '200':
          description: Collection loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserCollectionResponse'
              examples:
                collection:
                  $ref: '#/components/examples/GetUserCollection'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UidNotFoundError'
  /tags/pair:
    post:
      tags: [Tags]
      summary: Pair physical NFC tag
      description: |
        Pair a physical NFC UID to the current attendee account.

        This endpoint is used when the conference starts and an attendee arrives
        at the reception table. Staff or the attendee app reads the physical NFC
        UID and calls this endpoint to bind the UID to the attendee account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairTagRequest'
            examples:
              pair:
                $ref: '#/components/examples/PairTagRequest'
      responses:
        '200':
          description: Tag paired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
              examples:
                paired:
                  value:
                    status: success
                    message: Tag paired successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/TagAlreadyInUseError'
  /collections/scan:
    post:
      tags: [Collections]
      summary: Physical scan collection
      description: |
        NFC tag exchange and stamp collection endpoint.

        Flow:
        - An attendee scans another attendee tag, sponsor stand tag, or community
          stand tag.
        - The scanned URL opens `https://game.hitcon2026.online/b?u={user_id}`.
        - The app is redirected by the service, reads the physical NFC UID, and
          posts both `target_user_id` and `scanned_nfc_uid` to this endpoint.
        - The server verifies the scan, determines the target type, records the
          collection or stamp, and returns the scanned tag information.
        - The app uses the response data to update local app storage.

        Security requirement:
        The backend must strictly verify `target_user_id` against
        `scanned_nfc_uid` to prevent tag cloning or tampering with the `u` query
        value in the tag URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanCollectionRequest'
            examples:
              scan:
                $ref: '#/components/examples/ScanCollectionRequest'
      responses:
        '200':
          description: Scan handled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanCollectionResponse'
              examples:
                attendee:
                  $ref: '#/components/examples/ScanAttendeeResponse'
                sponsorStand:
                  $ref: '#/components/examples/ScanSponsorStandResponse'
                communityStand:
                  $ref: '#/components/examples/ScanCommunityStandResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/SecurityVerificationFailedError'
        '404':
          $ref: '#/components/responses/UidNotFoundError'
  /collections/phishing:
    post:
      tags: [Collections]
      summary: Trigger phishing easter egg
      description: |
        Triggered when the app is opened via a clicked link and no physical NFC
        signal is detected. This is a social engineering trap state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhishingRequest'
            examples:
              phishing:
                $ref: '#/components/examples/PhishingRequest'
      responses:
        '200':
          description: Phishing state returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhishingResponse'
              examples:
                phished:
                  $ref: '#/components/examples/PhishingResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /missions/sponsor-stands:
    get:
      tags: [Missions]
      summary: Get sponsor stand stamp progress
      description: Returns the authenticated user's sponsor stand stamp progress and prize threshold.
      responses:
        '200':
          description: Sponsor stand mission progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SponsorMissionsResponse'
              examples:
                sponsorStands:
                  $ref: '#/components/examples/SponsorMissionsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /missions/community-stands:
    get:
      tags: [Missions]
      summary: Get community stand stamp progress
      description: Returns the authenticated user's community stand stamp progress and prize threshold.
      responses:
        '200':
          description: Community stand mission progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMissionsResponse'
              examples:
                communityStands:
                  $ref: '#/components/examples/CommunityMissionsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /scoreboard/global:
    get:
      tags: [Scoreboard]
      summary: Get global scoreboard
      description: Returns the global ranking list.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          example: 50
      responses:
        '200':
          description: Global ranking list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalScoreboardResponse'
              examples:
                global:
                  $ref: '#/components/examples/GlobalScoreboardResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /staff/identify/{nfc_uid}:
    get:
      tags: [Staff]
      summary: Verify identity by physical NFC scan
      description: |
        Staff-only API. Requires JWT payload `role: "STAFF"`.

        Staff can scan an attendee's physical NFC tag with a phone to retrieve
        identity and prize eligibility.
      parameters:
        - in: path
          name: nfc_uid
          required: true
          schema:
            type: string
          example: '04:1A:2B:3C:4D:5E:6F'
      responses:
        '200':
          description: Identity and eligibility returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffIdentifyResponse'
              examples:
                identity:
                  $ref: '#/components/examples/StaffIdentifyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/SecurityVerificationFailedError'
        '404':
          $ref: '#/components/responses/UidNotFoundError'
  /staff/redeem:
    post:
      tags: [Staff]
      summary: Confirm prize redemption
      description: |
        Staff-only API. Requires JWT payload `role: "STAFF"`.

        Confirms redemption for a sponsor stand, community stand, or scoreboard
        prize category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffRedeemRequest'
            examples:
              redeem:
                $ref: '#/components/examples/StaffRedeemRequest'
      responses:
        '200':
          description: Prize redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
              examples:
                redeemed:
                  value:
                    status: success
                    message: Prize redeemed successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/SecurityVerificationFailedError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Conference SSO JWT sent as `Authorization: Bearer <SSO_JWT_Token>`.'

  responses:
    UnauthorizedError:
      description: |
        Authentication failed.

        Trigger: token is expired, invalid, or missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: UNAUTHORIZED
            message: Invalid or expired JWT token.
    SecurityVerificationFailedError:
      description: |
        Forbidden because of insufficient permission or anti-forgery verification failure.

        Triggers:
        - A normal attendee calls a staff-only API.
        - During `POST /collections/scan`, the target user id does not match the
          scanned physical NFC UID. This is treated as a replay attack or cloned tag.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: SECURITY_VERIFICATION_FAILED
            message: UID mismatch or insufficient permissions.
    UidNotFoundError:
      description: |
        Resource does not exist.

        Trigger: scanning an unpaired blank NFC tag or requesting a non-existent user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: UID_NOT_FOUND
            message: User or physical tag does not exist.
    TagAlreadyInUseError:
      description: |
        Resource conflict.

        Trigger: trying to pair an NFC tag that is already paired to another user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: TAG_ALREADY_IN_USE
            message: This NFC tag is already bound to another user.

  schemas:
    ErrorResponse:
      type: object
      description: Unified error response. Frontends should branch on `code`.
      required: [status, code, message]
      properties:
        status:
          type: string
          enum: [error]
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - SECURITY_VERIFICATION_FAILED
            - UID_NOT_FOUND
            - TAG_ALREADY_IN_USE
        message:
          type: string

    SuccessMessageResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string

    UserStats:
      type: object
      required: [score, tags_collected]
      properties:
        score:
          type: integer
        tags_collected:
          type: integer

    UserProfile:
      type: object
      description: Public profile for the authenticated user.
      required:
        - user_id
        - display_name
        - user_type
        - emoji_icon
        - bio
        - pixel_avatar_base64
        - stats
      properties:
        user_id:
          type: string
          description: Stable backend user id from JWT `sub`.
          example: sub_hash_from_jwt
        display_name:
          type: string
          example: Hacker_Aries
        user_type:
          type: string
          example: CAT
        emoji_icon:
          type: string
          example: cat
        bio:
          type: string
          example: I love reverse engineering.
        pixel_avatar_base64:
          type: string
          description: Base64-encoded image data
          example: iVBORw0KGgoAAAANSU...
        stats:
          $ref: '#/components/schemas/UserStats'

    GetMyProfileResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserProfile'

    UpdateMyProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name:
          type: string
          example: Aries_The_Great
        user_type:
          type: string
          example: TECH
        bio:
          type: string
          example: Updated bio.
        pixel_avatar_base64:
          type: string
          example: iVBORw0KGgo...

    CollectionItem:
      type: object
      required: [user_id, display_name, emoji_icon, collected_at]
      properties:
        user_id:
          type: string
        display_name:
          type: string
        emoji_icon:
          type: string
        collected_at:
          type: string
          format: date-time

    UserCollectionData:
      type: object
      required: [owner_display_name, total_collected, collection]
      properties:
        owner_display_name:
          type: string
        total_collected:
          type: integer
        collection:
          type: array
          items:
            $ref: '#/components/schemas/CollectionItem'

    GetUserCollectionResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserCollectionData'

    PairTagRequest:
      type: object
      required: [physical_uid]
      additionalProperties: false
      properties:
        physical_uid:
          type: string
          description: Physical hardware UID read from NFC hardware.
          example: '04:1A:2B:3C:4D:5E:6F'

    ScanCollectionRequest:
      type: object
      required: [target_user_id, scanned_nfc_uid]
      additionalProperties: false
      properties:
        target_user_id:
          type: string
          description: Parsed from query parameter `u` in scanned tag URL
          example: U_9V8W7X
        scanned_nfc_uid:
          type: string
          description: UID read from NFC hardware
          example: '04:99:88:77:66:55:44'

    ScanAttendeeTargetInfo:
      type: object
      required: [user_type, emoji_icon, total_tags]
      properties:
        user_type:
          type: string
        emoji_icon:
          type: string
        total_tags:
          type: integer

    ScanAttendeeData:
      type: object
      required: [target_info, ciphertext, pixel_avatar_base64]
      properties:
        target_info:
          $ref: '#/components/schemas/ScanAttendeeTargetInfo'
        ciphertext:
          type: string
          description: Ciphertext for client-side decryption
          example: U2FsdGVkX1+xxyz...
        pixel_avatar_base64:
          type: string
          example: iVBORw0KGgo...

    ScanAttendeeResponse:
      type: object
      required: [status, type, data]
      properties:
        status:
          type: string
          enum: [success]
        type:
          type: string
          enum: [ATTENDEE]
        data:
          $ref: '#/components/schemas/ScanAttendeeData'

    ScanSponsorStandData:
      type: object
      required:
        - sponsor_stand_id
        - sponsor_stand_name
        - sponsor_stand_message
        - current_stamps
        - required_for_prize
      properties:
        sponsor_stand_id:
          type: string
        sponsor_stand_name:
          type: string
        sponsor_stand_message:
          type: string
        current_stamps:
          type: integer
        required_for_prize:
          type: integer

    ScanSponsorStandResponse:
      type: object
      required: [status, type, data]
      properties:
        status:
          type: string
          enum: [success]
        type:
          type: string
          enum: [SPONSOR_STAND]
        data:
          $ref: '#/components/schemas/ScanSponsorStandData'

    ScanCommunityStandData:
      type: object
      required:
        - community_stand_id
        - community_stand_name
        - community_stand_message
        - current_stamps
        - required_for_prize
      properties:
        community_stand_id:
          type: string
        community_stand_name:
          type: string
        community_stand_message:
          type: string
        current_stamps:
          type: integer
        required_for_prize:
          type: integer

    ScanCommunityStandResponse:
      type: object
      required: [status, type, data]
      properties:
        status:
          type: string
          enum: [success]
        type:
          type: string
          enum: [COMMUNITY_STAND]
        data:
          $ref: '#/components/schemas/ScanCommunityStandData'

    ScanCollectionResponse:
      oneOf:
        - $ref: '#/components/schemas/ScanAttendeeResponse'
        - $ref: '#/components/schemas/ScanSponsorStandResponse'
        - $ref: '#/components/schemas/ScanCommunityStandResponse'
      discriminator:
        propertyName: type
        mapping:
          ATTENDEE: '#/components/schemas/ScanAttendeeResponse'
          SPONSOR_STAND: '#/components/schemas/ScanSponsorStandResponse'
          COMMUNITY_STAND: '#/components/schemas/ScanCommunityStandResponse'

    PhishingRequest:
      type: object
      required: [target_user_id]
      additionalProperties: false
      properties:
        target_user_id:
          type: string
          example: U_9V8W7X

    PhishingData:
      type: object
      required: [alert_title, alert_message, score_penalty]
      properties:
        alert_title:
          type: string
        alert_message:
          type: string
        score_penalty:
          type: integer
          example: -20

    PhishingResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [phished]
        data:
          $ref: '#/components/schemas/PhishingData'

    MissionItem:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [collected, pending]

    SponsorMissionsData:
      type: object
      required: [collected_count, required_for_prize, sponsor_stands]
      properties:
        collected_count:
          type: integer
        required_for_prize:
          type: integer
        sponsor_stands:
          type: array
          items:
            $ref: '#/components/schemas/MissionItem'

    SponsorMissionsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/SponsorMissionsData'

    CommunityMissionsData:
      type: object
      required: [collected_count, required_for_prize, community_stands]
      properties:
        collected_count:
          type: integer
        required_for_prize:
          type: integer
        community_stands:
          type: array
          items:
            $ref: '#/components/schemas/MissionItem'

    CommunityMissionsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/CommunityMissionsData'

    ScoreboardItem:
      type: object
      required: [rank, display_name, score, emoji_icon]
      properties:
        rank:
          type: integer
        display_name:
          type: string
        score:
          type: integer
        emoji_icon:
          type: string

    GlobalScoreboardData:
      type: object
      required: [last_updated, rankings]
      properties:
        last_updated:
          type: string
          format: date-time
        rankings:
          type: array
          items:
            $ref: '#/components/schemas/ScoreboardItem'

    GlobalScoreboardResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/GlobalScoreboardData'

    RedeemEligibilityEntry:
      type: object
      required: [can_redeem]
      properties:
        can_redeem:
          type: boolean
        already_redeemed:
          type: boolean
        reason:
          type: string

    StaffEligibility:
      type: object
      required: [sponsor_stand_prize, community_stand_prize, scoreboard_prize]
      properties:
        sponsor_stand_prize:
          $ref: '#/components/schemas/RedeemEligibilityEntry'
        community_stand_prize:
          $ref: '#/components/schemas/RedeemEligibilityEntry'
        scoreboard_prize:
          $ref: '#/components/schemas/RedeemEligibilityEntry'

    StaffIdentifyData:
      type: object
      required: [user_id, display_name, pixel_avatar_base64, eligibility]
      properties:
        user_id:
          type: string
        display_name:
          type: string
        pixel_avatar_base64:
          type: string
        eligibility:
          $ref: '#/components/schemas/StaffEligibility'

    StaffIdentifyResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/StaffIdentifyData'

    StaffRedeemRequest:
      type: object
      required: [user_id, prize_category]
      additionalProperties: false
      properties:
        user_id:
          type: string
        prize_category:
          type: string
          enum: [SPONSOR_STAND, COMMUNITY_STAND, SCOREBOARD]

  examples:
    GetMyProfile:
      value:
        status: success
        data:
