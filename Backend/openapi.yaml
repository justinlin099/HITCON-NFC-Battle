openapi: 3.0.3
info:
  title: HITCON 2026 NFC Battle API
  version: 1.0.0
  description: |
    OpenAPI specification for the HITCON 2026 NFC Battle backend.

    `Backend/game-flow.md` is the source of truth for product behavior. This
    file mirrors that flow as a machine-readable API contract.

    User roles:
    - `ATTENDEE`
    - `STAFF`
    - `SPONSOR`
    - `COMMUNITY`

    Authenticated app APIs use the conference JWT:
    `Authorization: Bearer <JWT>`. The backend derives caller identity from the
    JWT subject, which is the user ID provided by the JWT issuer. JWT
    verification uses a shared secret and HMAC.

    Required JWT claims:
    - `sub`: user ID, provided by the JWT issuer.
    - `exp`: expiration time.
    - `iss`: issuer.
    - `aud`: audience.
    - `role`: caller role, used for fast role lookup without querying the DB.

    Physical NFC tag IDs are predictable, so scan requests must include both the
    parsed user ID from the tag URL and the physical ID read from the tag. The
    server must verify that the physical ID belongs to the parsed user ID before
    adding the target user to the scanner's collection.

    Collection records are the long-term permission for full profile access.
    `profile_version` and `collection_version` are integer versions stored on
    the user row. `profile_version` changes when profile fields change.
    `collection_version` changes only when that user's own collection changes.

    `GET /users/me` is the only endpoint that lazy-initializes a user profile.
    The app should call it before pairing tags, scanning, recording phishing
    events, or using cache/bootstrap APIs that expect the authenticated user row
    to already exist.

    `nfc_tag_key` is a per-user random 6-byte key encoded as a 12-character
    lowercase hex string. It is returned only in self-profile responses
    (`GET /users/me` and the `me` object from `GET /users/me/bootstrap`). The
    mobile app should store it locally, not show it to the user, use it to lock
    the NFC tag after writing the tag URL, and use it to unlock the tag after
    the conference when the app exposes that action.

    Staff APIs under `/staff/*` require a conference JWT whose `role` claim is
    `STAFF`. Scoreboard status, freeze, and resume APIs additionally require
    `STAFF_DANGER_TOKEN`.
    Freeze calculates and stores a per-user score and prize snapshot using
    `scoring_cutoff_at` as the latest event timestamp that counts toward the
    snapshot. Prize lookups read that stored snapshot instead of recalculating
    results on every request. Resume invalidates the current freeze snapshot and
    reopens scoring.

    Current provisional scoring formula:
    `score = 10 * num_of_collection`. This formula may be finalized or changed
    in the future.

    A scoreboard can stay in `FREEZING` only until the configured
    `freeze_timeout`. After that, the freeze is stale and staff may recover it
    with `POST /staff/resume_scoreboard`.

    Scoreboard state behavior:

    The following endpoints are available in all states (`OPEN`, `FREEZING`,
    and `FROZEN`):
    - `GET /users/me`
    - `PATCH /users/me`
    - `GET /users/me/bootstrap`
    - `POST /users/batch`
    - `GET /users/{user_id}`
    - `GET /users/{user_id}/collection`, subject to collection-based visibility
      permission
    - `POST /tags/pair`
    - `POST /collection/scan`
    - `POST /collection/phishing`
    - `GET /missions/stamp`
    - `GET /staff/scoreboard_status`
    - `POST /staff/replace_user_tag`

    The following endpoints are available only in `FROZEN`:
    - `GET /users/me/prize`; rejected in `OPEN` and `FREEZING` with
      `SCOREBOARD_NOT_FROZEN`. If the scoreboard state changes during a
      consistent read, it is rejected with `SCOREBOARD_READ_INCONSISTENT` and
      clients should retry.

    The following endpoints are available in `OPEN` and `FROZEN`, but rejected
    in `FREEZING`:
    - `GET /scoreboard`; returns live scores in `OPEN`, returns the stored
      freeze snapshot in `FROZEN`, and is rejected in `FREEZING` with
      `SCOREBOARD_FREEZING` error. If the scoreboard state changes during a
      consistent read, it is rejected with `SCOREBOARD_READ_INCONSISTENT` and
      clients should retry.

    The following endpoints are state transition operations:
    - `POST /staff/freeze_scoreboard`: accepted only in `OPEN`; rejected in
      `FREEZING` or `FROZEN` with `409 Conflict`
    - `POST /staff/resume_scoreboard`: accepted in `FROZEN` and stale
      `FREEZING`; rejected in `OPEN` and non-stale `FREEZING` with
      `SCOREBOARD_NOT_FROZEN`

    The app remains usable after the conference ends. Pairing, scanning,
    phishing records, profile updates, collection browsing, bootstrap, and
    batch refresh continue to update live app data after the scoreboard is
    frozen. The freeze operation creates a score and prize snapshot; later live
    activity must not change that stored snapshot unless staff explicitly
    resumes scoring and freezes again.
servers:
  - url: https://{devHost}/v1
    description: Development API
    variables:
      devHost:
        default: localhost
security:
  - bearerAuth: []
tags:
  - name: Users
  - name: Tags
  - name: Collection
  - name: Missions
  - name: Scoreboard
  - name: Staff
paths:
  /users/me:
    get:
      tags: [Users]
      summary: Lazy initialize or get my profile
      description: |
        Creates a default profile when the authenticated JWT subject is new,
        then returns the authenticated user's complete data. If the user has
        not paired an NFC tag yet, `physical_id` is returned as `null`.
      responses:
        '200':
          description: Profile loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyProfileResponse'
              examples:
                profile:
                  $ref: '#/components/examples/GetMyProfileResponse'
                unpaired:
                  $ref: '#/components/examples/GetMyUnpairedProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Users]
      summary: Update my profile
      description: |
        Partially updates the authenticated user's profile. The user may send
        only the fields they want to change. Updatable fields are
        `display_name`, `emoji_icon`, `bio`, and `pixel_avatar_base64`. If the
        submitted fields are identical to the stored profile, the server returns
        the current profile without incrementing `profile_version`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMyProfileRequest'
            examples:
              update:
                $ref: '#/components/examples/UpdateMyProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyProfileResponse'
              examples:
                profile:
                  $ref: '#/components/examples/GetMyProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /users/me/prize:
    get:
      tags: [Users]
      summary: Get my prize result
      description: |
        Returns the authenticated user's prize result after the scoreboard is
        frozen and prize calculation has run. Prize results are read from the
        stored freeze snapshot. This endpoint is rejected while the scoreboard
        is `OPEN` or `FREEZING`. If the scoreboard state changes during a
        consistent read, the endpoint returns `SCOREBOARD_READ_INCONSISTENT`
        and clients should retry.
      responses:
        '200':
          description: Prize result loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyPrizeResponse'
              examples:
                prize:
                  $ref: '#/components/examples/GetMyPrizeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Scoreboard is not frozen yet, or the read saw a transient scoreboard state change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_frozen:
                  $ref: '#/components/examples/ScoreboardNotFrozenError'
                read_inconsistent:
                  $ref: '#/components/examples/ScoreboardReadInconsistentError'
  /users/me/bootstrap:
    get:
      tags: [Users]
      summary: Bootstrap my local app cache
      description: |
        Returns the authenticated user's full profile plus full profiles for all
        users they have collected. This endpoint is intended for app recovery or
        fresh installs, not normal incremental refresh. Collected user profiles
        do not include nested collection lists. The authenticated user must
        already be initialized with `GET /users/me`.
      responses:
        '200':
          description: Bootstrap data loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyBootstrapResponse'
              examples:
                bootstrap:
                  $ref: '#/components/examples/GetMyBootstrapResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /users/batch:
    post:
      tags: [Users]
      summary: Batch refresh user profiles
      description: |
        Read-only, idempotent batch lookup for multiple cached user profiles.
        This endpoint uses `POST` only so the client can send a structured
        request body with many user IDs and cached versions.

        For each user, the server applies the same visibility rule as
        `GET /users/{user_id}`: full profile if the caller has collected that
        user, otherwise partial profile. If the client sends both cached
        versions and both match the server's current versions, the server
        returns only `user_id` and `unchanged: true` for that user.

        `profile_version` is the client's cached version of that user's profile
        fields. `collection_version` is the client's cached version of that
        user's collection list. When either cached version is omitted or stale,
        the server returns `unchanged: false` plus the user's profile using the
        same visibility behavior as `GET /users/{user_id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchGetUsersRequest'
            examples:
              batch:
                $ref: '#/components/examples/BatchGetUsersRequest'
      responses:
        '200':
          description: Batch profile data loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGetUsersResponse'
              examples:
                batch:
                  $ref: '#/components/examples/BatchGetUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get another user's profile
      description: |
        Returns another user's profile. If the caller has collected the queried
        user, the server returns full profile data plus version metadata.
        Otherwise, it only returns `user_id`, `display_name`, and `emoji_icon`,
        allowing the mobile app to show a locked character state.

        The client may send both `profile_version` and `collection_version` for
        a cached full profile. If both versions match the server's current
        versions, the server returns an unchanged marker instead of the profile
        body. If either version is omitted or stale, the server returns the
        profile body using the normal visibility rule.
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
          description: Target user ID from the JWT issuer.
          example: kktix_hash_abc123
        - in: query
          name: profile_version
          required: false
          schema:
            type: integer
            minimum: 0
          description: Locally cached profile version for this user.
          example: 2
        - in: query
          name: collection_version
          required: false
          schema:
            type: integer
            minimum: 0
          description: Locally cached collection version for this user.
          example: 5
      responses:
        '200':
          description: Profile loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProfileResponse'
              examples:
                partial:
                  $ref: '#/components/examples/GetPartialUserProfileResponse'
                full:
                  $ref: '#/components/examples/GetFullUserProfileResponse'
                unchanged:
                  $ref: '#/components/examples/GetUnchangedUserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /users/{user_id}/collection:
    get:
      tags: [Users]
      summary: Get another user's collection
      description: |
        Returns the queried user's collection only when the caller has collected
        the queried user. For each user in that collection, the server applies
        the same visibility rule from the caller's point of view: full profile
        if the caller has collected that listed user, otherwise partial profile.

        The client may send `collection_version` for a cached collection. If it
        matches the server's current collection version for the queried user,
        the server returns an unchanged marker instead of the collection body.
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
          description: Target user ID from the JWT issuer.
          example: kktix_hash_def456
        - in: query
          name: collection_version
          required: false
          schema:
            type: integer
            minimum: 0
          description: Locally cached collection version for this user.
          example: 5
      responses:
        '200':
          description: Collection loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserCollectionResponse'
              examples:
                collection:
                  $ref: '#/components/examples/GetUserCollectionResponse'
                unchanged:
                  $ref: '#/components/examples/GetUnchangedUserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /tags/pair:
    post:
      tags: [Tags]
      summary: Pair a physical NFC tag to my profile
      description: |
        Called at the reception desk after the user picks up a tag and scans it
        with the app. The user must already be initialized with `GET /users/me`
        before pairing. The app also writes
        `https://game.hitcon2026.online/b?u={user_id}` to the tag, then locks
        the tag so it is read-only and cannot be accidentally overwritten.

        This endpoint remains available in `OPEN`, `FREEZING`, and `FROZEN` so
        the app keeps working after the conference ends. Pairing after a freeze
        updates live app data but does not change the stored score and prize
        snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairTagRequest'
            examples:
              pair:
                $ref: '#/components/examples/PairTagRequest'
      responses:
        '200':
          description: Tag paired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                paired:
                  value:
                    status: success
                    message: Tag paired successfully.
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
        '409':
          $ref: '#/components/responses/TagAlreadyPairedError'
  /collection/scan:
    post:
      tags: [Collection]
      summary: Scan another NFC tag
      description: |
        Called after the app opens from a scanned tag URL, reads the tag's
        physical ID, and extracts `user_id` from the URL.

        The server verifies that `physical_id` belongs to `user_id`, adds the
        target user ID to the scanner's collection, increments the scanner's
        `collection_version` if this is a new collection record, and returns the
        scanned user's profile without that user's collection list.

        This endpoint remains available in `OPEN`, `FREEZING`, and `FROZEN` so
        the app keeps working after the conference ends. Scans after a freeze
        update live collection data but do not change the stored score and prize
        snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanCollectionRequest'
            examples:
              scan:
                $ref: '#/components/examples/ScanCollectionRequest'
      responses:
        '200':
          description: Scan accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanCollectionResponse'
              examples:
                scan:
                  $ref: '#/components/examples/ScanCollectionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/PhysicalIdMismatchError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /collection/phishing:
    post:
      tags: [Collection]
      summary: Record a clicked-link phishing event
      description: |
        Called when the app is opened by clicking a URL instead of scanning a
        physical NFC tag, so the app cannot detect a physical ID. The server
        records `victim` and `attacker`.

        This endpoint remains available in `OPEN`, `FREEZING`, and `FROZEN` so
        the app keeps working after the conference ends. Phishing records after
        a freeze update live event data but do not change the stored score and
        prize snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhishingRequest'
            examples:
              phishing:
                $ref: '#/components/examples/PhishingRequest'
      responses:
        '200':
          description: Phishing event recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                recorded:
                  value:
                    status: success
                    message: Phishing event recorded.
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /missions/stamp:
    get:
      tags: [Missions]
      summary: Get stamp mission progress
      description: |
        Returns `stamp_threshold` and the authenticated user's progress toward
        the sponsor plus community stamp prize.
      responses:
        '200':
          description: Stamp mission progress loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStampMissionResponse'
              examples:
                stamp:
                  $ref: '#/components/examples/GetStampMissionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /scoreboard:
    get:
      tags: [Scoreboard]
      summary: Get global scoreboard
      description: |
        Returns the global scoreboard using offset/limit pagination.

        In `OPEN`, this endpoint returns live scores using the current
        provisional formula: `score = 10 * num_of_collection`.

        In `FREEZING`, this endpoint is rejected because a consistent snapshot
        is being calculated.

        In `FROZEN`, this endpoint returns the stored freeze snapshot, so scores
        do not change even if pairing, scanning, phishing records, and profile
        updates continue after the conference ends. The response includes the
        snapshot `freeze_id` and `scoring_cutoff_at`.

        If the scoreboard state changes during a consistent read, the endpoint
        returns `SCOREBOARD_READ_INCONSISTENT` and clients should retry.
      parameters:
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          example: 50
      responses:
        '200':
          description: Scoreboard loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetScoreboardResponse'
              examples:
                scoreboard:
                  $ref: '#/components/examples/GetScoreboardResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Scoreboard is freezing, or the read saw a transient scoreboard state change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                freezing:
                  $ref: '#/components/examples/ScoreboardFreezingError'
                read_inconsistent:
                  $ref: '#/components/examples/ScoreboardReadInconsistentError'
  /staff/scoreboard_status:
    get:
      tags: [Staff]
      summary: Get scoreboard freeze status
      description: |
        Staff-only status endpoint for inspecting the scoreboard state before
        freeze or resume operations. Requires a staff JWT plus
        `STAFF_DANGER_TOKEN`. Returns the current state, current `freeze_id`,
        freeze timestamps, `scoring_cutoff_at`, configured freeze timeout, and
        whether a `FREEZING` state is stale.
      security:
        - bearerAuth: []
          staffDangerToken: []
      responses:
        '200':
          description: Scoreboard status loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetScoreboardStatusResponse'
              examples:
                status:
                  $ref: '#/components/examples/GetScoreboardStatusResponse'
        '401':
          description: Missing or invalid JWT, or missing or invalid `STAFF_DANGER_TOKEN`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
                staff_danger_token:
                  $ref: '#/components/examples/StaffDangerTokenError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /staff/replace_user_tag:
    post:
      tags: [Staff]
      summary: Replace a user's paired NFC tag
      description: |
        Staff-only endpoint used when a user's NFC tag is broken or replaced.
        Requires a conference JWT whose `role` claim is `STAFF`. Replaces the
        server-side `nfc_tags` mapping so `new_physical_id` belongs to
        `user_id`. Staff or the app should write
        `https://game.hitcon2026.online/b?u={user_id}` to the new tag and lock
        it before giving it to the user.

        The `nfc_tags` table is the source of truth for the user's paired
        physical tag ID. After this replacement, the old physical tag ID immediately
        stops passing `POST /collection/scan`. This operation does not change
        `profile_version` or `collection_version`. `GET /users/me` and
        `GET /users/me/bootstrap` return the new physical tag ID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceUserTagRequest'
            examples:
              replace:
                $ref: '#/components/examples/ReplaceUserTagRequest'
      responses:
        '200':
          description: User tag replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                replaced:
                  value:
                    status: success
                    message: User tag replaced successfully.
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
        '409':
          $ref: '#/components/responses/TagAlreadyPairedError'
  /staff/freeze_scoreboard:
    post:
      tags: [Staff]
      summary: Freeze scoreboard and calculate prizes
      description: |
        Freezes the scoreboard near the end of the conference. Requires a staff
        JWT plus `STAFF_DANGER_TOKEN`. The server should atomically transition
        the scoreboard from `OPEN` to `FREEZING`, calculate final scores and
        stored prize results for a new `freeze_id`, then transition to `FROZEN`.

        This endpoint is accepted only while the scoreboard is `OPEN`. A
        successful freeze creates a score and prize snapshot, but it does not
        disable live app features.

        The request may include `scoring_cutoff_at`, which is the latest event
        timestamp that should count in the score snapshot. If omitted, the
        server uses its current time. The value must not be later than the
        server time when the freeze begins. The server should include only
        collection records and phishing records whose event timestamps are less
        than or equal to `scoring_cutoff_at`.

        A scoreboard that remains in `FREEZING` longer than `freeze_timeout` is
        stale. Stale partial results for that `freeze_id` must not be visible to
        users.

        Current provisional scoring formula:
        `score = 10 * num_of_collection`. This formula may be finalized or
        changed in the future.

        Prize results are snapshot data and should not be recalculated on every
        `GET /users/me/prize` request.
      security:
        - bearerAuth: []
          staffDangerToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreezeScoreboardRequest'
            examples:
              freeze:
                $ref: '#/components/examples/FreezeScoreboardRequest'
      responses:
        '200':
          description: Scoreboard frozen and prizes calculated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeScoreboardResponse'
              examples:
                frozen:
                  $ref: '#/components/examples/FreezeScoreboardResponse'
        '401':
          description: Missing or invalid JWT, or missing or invalid `STAFF_DANGER_TOKEN`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
                staff_danger_token:
                  $ref: '#/components/examples/StaffDangerTokenError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ScoreboardAlreadyFrozenError'
  /staff/resume_scoreboard:
    post:
      tags: [Staff]
      summary: Resume an accidentally frozen scoreboard
      description: |
        Resumes the scoreboard after an accidental freeze. Requires a staff JWT
        plus `STAFF_DANGER_TOKEN`. The server should transition `FROZEN` back
        to `OPEN` and invalidate the stored result snapshot for the current
        `freeze_id`.

        This endpoint may also recover a stale `FREEZING` state by changing it
        back to `OPEN` and invalidating partial results for the stale
        `freeze_id`. It is rejected in `OPEN` and non-stale `FREEZING`.
      security:
        - bearerAuth: []
          staffDangerToken: []
      responses:
        '200':
          description: Scoreboard resumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                resumed:
                  value:
                    status: success
                    message: Scoreboard resumed.
        '401':
          description: Missing or invalid JWT, or missing or invalid `STAFF_DANGER_TOKEN`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
                staff_danger_token:
                  $ref: '#/components/examples/StaffDangerTokenError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ScoreboardNotFrozenError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Conference JWT sent as `Authorization: Bearer <JWT>`. Verified with a shared secret and HMAC. Required claims: `sub`, `exp`, `iss`, `aud`, and `role`.'
    staffDangerToken:
      type: apiKey
      in: header
      name: STAFF_DANGER_TOKEN
      description: Staff danger token for freeze/resume operations.

  responses:
    BadRequestError:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: BAD_REQUEST
            message: Invalid request body or query parameter.
    UnauthorizedError:
      description: Missing or invalid HMAC-signed JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: UNAUTHORIZED
            message: Missing or invalid JWT.
    StaffDangerTokenError:
      description: Missing or invalid `STAFF_DANGER_TOKEN`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: STAFF_DANGER_TOKEN_INVALID
            message: Missing or invalid staff danger token.
    UserNotFoundError:
      description: User not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: USER_NOT_FOUND
            message: User not found.
    ForbiddenError:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: FORBIDDEN
            message: Forbidden.
    PhysicalIdMismatchError:
      description: Physical tag ID does not belong to the parsed user ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: PHYSICAL_ID_MISMATCH
            message: Physical tag ID does not match user ID.
    TagAlreadyPairedError:
      description: NFC tag is already paired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: TAG_ALREADY_PAIRED
            message: This NFC tag is already paired.
    ScoreboardAlreadyFrozenError:
      description: Scoreboard is already frozen.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: SCOREBOARD_ALREADY_FROZEN
            message: Scoreboard is already frozen.
    ScoreboardFreezingError:
      description: Scoreboard snapshot is being calculated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: SCOREBOARD_FREEZING
            message: Scoreboard is being frozen.
    ScoreboardNotFrozenError:
      description: Scoreboard is not frozen yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: SCOREBOARD_NOT_FROZEN
            message: Scoreboard is not frozen yet.
    ScoreboardReadInconsistentError:
      description: Scoreboard state changed during a consistent read; clients should retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            code: SCOREBOARD_READ_INCONSISTENT
            message: Scoreboard state changed while reading. Please retry.

  schemas:
    ErrorResponse:
      type: object
      required: [status, code, message]
      properties:
        status:
          type: string
          enum: [error]
        code:
          type: string
          enum:
            - BAD_REQUEST
            - UNAUTHORIZED
            - STAFF_DANGER_TOKEN_INVALID
            - FORBIDDEN
            - USER_NOT_FOUND
            - PHYSICAL_ID_MISMATCH
            - TAG_ALREADY_PAIRED
            - SCOREBOARD_ALREADY_FROZEN
            - SCOREBOARD_FREEZING
            - SCOREBOARD_NOT_FROZEN
            - SCOREBOARD_READ_INCONSISTENT
        message:
          type: string

    SuccessResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string

    UserRole:
      type: string
      enum: [ATTENDEE, STAFF, SPONSOR, COMMUNITY]

    UserProfilePublicFull:
      type: object
      required:
        - user_id
        - display_name
        - role
        - emoji_icon
        - bio
        - pixel_avatar_base64
        - profile_version
        - collection_version
      properties:
        user_id:
          type: string
          description: User ID provided by the JWT issuer.
          example: kktix_hash_abc123
        display_name:
          type: string
          example: Hacker_Aries
        role:
          $ref: '#/components/schemas/UserRole'
        emoji_icon:
          type: string
          description: Emoji character shown as the user's icon.
          example: 🐱
        bio:
          type: string
          example: I love reverse engineering.
        pixel_avatar_base64:
          type: string
          description: Base64-encoded 48x48 pixel avatar image.
          example: iVBORw0KGgoAAAANSU...
        profile_version:
          type: integer
          description: Incremented when profile fields change.
          example: 3
        collection_version:
          type: integer
          description: Incremented when this user's own collection changes.
          example: 8

    UserProfileSelf:
      allOf:
        - $ref: '#/components/schemas/UserProfilePublicFull'
        - type: object
          required:
            - physical_id
            - nfc_tag_key
            - collection
          properties:
            physical_id:
              type: string
              nullable: true
              description: Paired NFC tag physical ID. This is null before the user pairs an NFC tag.
              example: '04:1A:2B:3C:4D:5E:6F'
            nfc_tag_key:
              type: string
              pattern: '^[0-9a-f]{12}$'
              description: Per-user 6-byte NFC tag lock/unlock key encoded as a 12-character lowercase hex string. Returned only to the authenticated user.
              example: a1b2c3d4e5f6
            collection:
              type: array
              description: User IDs this user has previously scanned.
              items:
                type: string
              example: [kktix_hash_def456]

    UserProfilePartial:
      type: object
      required: [user_id, display_name, emoji_icon]
      properties:
        user_id:
          type: string
          example: kktix_hash_def456
        display_name:
          type: string
          example: Alice
        emoji_icon:
          type: string
          description: Emoji character shown as the user's icon.
          example: 😉

    UserCollectionItem:
      oneOf:
        - $ref: '#/components/schemas/UserProfilePublicFull'
        - $ref: '#/components/schemas/UserProfilePartial'

    UserCollection:
      type: object
      required: [user_id, collection_version, users]
      properties:
        user_id:
          type: string
          description: Owner of this collection.
          example: kktix_hash_def456
        collection_version:
          type: integer
          example: 8
        users:
          type: array
          description: Hydrated users in the collection.
          items:
            $ref: '#/components/schemas/UserCollectionItem'

    GetMyProfileResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserProfileSelf'

    GetMyBootstrapResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [me, collected_users]
          properties:
            me:
              $ref: '#/components/schemas/UserProfileSelf'
            collected_users:
              type: array
              description: Full profiles for users the authenticated user has collected.
              items:
                $ref: '#/components/schemas/UserProfilePublicFull'

    UpdateMyProfileRequest:
      type: object
      description: |
        Partial profile update. Only `display_name`, `emoji_icon`, `bio`, and
        `pixel_avatar_base64` are updatable.
      additionalProperties: false
      properties:
        display_name:
          type: string
          example: Aries_The_Great
        emoji_icon:
          type: string
          description: Emoji character shown as the user's icon.
          example: 🚀
        bio:
          type: string
          example: Updated bio.
        pixel_avatar_base64:
          type: string
          description: Base64-encoded 48x48 pixel avatar image.
          example: iVBORw0KGgo...

    GetUserProfileResponse:
      oneOf:
        - $ref: '#/components/schemas/GetUnchangedUserResponse'
        - $ref: '#/components/schemas/GetPartialUserProfileResponse'
        - $ref: '#/components/schemas/GetFullUserProfileResponse'

    CachedUserUnchanged:
      type: object
      required: [user_id, unchanged]
      properties:
        user_id:
          type: string
          example: kktix_hash_def456
        unchanged:
          type: boolean
          enum: [true]

    GetUnchangedUserResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/CachedUserUnchanged'

    GetPartialUserProfileResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserProfilePartial'

    GetFullUserProfileResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserProfilePublicFull'

    GetUserCollectionResponse:
      oneOf:
        - $ref: '#/components/schemas/GetUserCollectionLoadedResponse'
        - $ref: '#/components/schemas/GetUnchangedUserResponse'

    GetUserCollectionLoadedResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/UserCollection'

    BatchGetUsersRequest:
      type: object
      required: [users]
      additionalProperties: false
      properties:
        users:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [user_id]
            additionalProperties: false
            properties:
              user_id:
                type: string
                example: kktix_hash_def456
              profile_version:
                type: integer
                minimum: 0
                description: |
                  Locally cached profile version for this user, if any. If this
                  is omitted, the server treats the profile cache as stale.
                example: 2
              collection_version:
                type: integer
                minimum: 0
                description: |
                  Locally cached collection version for this user's collection
                  list, if any. If the caller has full access to this user and
                  this is omitted, the server treats the collection cache as
                  stale.
                example: 7

    BatchUserResult:
      oneOf:
        - $ref: '#/components/schemas/CachedUserUnchanged'
        - type: object
          required: [user_id, unchanged, data]
          properties:
            user_id:
              type: string
              example: kktix_hash_def456
            unchanged:
              type: boolean
              enum: [false]
            data:
              description: Profile data using the same visibility behavior as `GET /users/{user_id}`.
              oneOf:
                - $ref: '#/components/schemas/UserProfilePublicFull'
                - $ref: '#/components/schemas/UserProfilePartial'

    BatchGetUsersResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [results]
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/BatchUserResult'

    PairTagRequest:
      type: object
      required: [physical_id]
      additionalProperties: false
      properties:
        physical_id:
          type: string
          description: Physical ID read from the NFC tag.
          example: '04:1A:2B:3C:4D:5E:6F'

    ReplaceUserTagRequest:
      type: object
      required: [user_id, new_physical_id]
      additionalProperties: false
      properties:
        user_id:
          type: string
          description: User ID whose paired NFC tag should be replaced.
          example: kktix_hash_abc123
        new_physical_id:
          type: string
          description: Physical ID read from the replacement NFC tag.
          example: '04:FE:DC:BA:98:76:54'

    ScanCollectionRequest:
      type: object
      required: [user_id, physical_id]
      additionalProperties: false
      properties:
        user_id:
          type: string
          description: User ID parsed from the scanned tag URL.
          example: kktix_hash_def456
        physical_id:
          type: string
          description: Physical ID read from the scanned NFC tag.
          example: '04:99:88:77:66:55:44'

    ScanCollectionResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [collected_user_id, first_time_collected, profile]
          properties:
            collected_user_id:
              type: string
              example: kktix_hash_def456
            first_time_collected:
              type: boolean
              description: Whether this scan inserted a new collection record.
              example: true
            profile:
              $ref: '#/components/schemas/UserProfilePublicFull'

    PhishingRequest:
      type: object
      required: [victim, attacker]
      additionalProperties: false
      properties:
        victim:
          type: string
          description: User ID of the authenticated app user who clicked the link.
          example: kktix_hash_victim
        attacker:
          type: string
          description: User ID parsed from the clicked phishing URL.
          example: kktix_hash_attacker

    GetStampMissionResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required:
            - stamp_threshold
            - sponsor_count
            - community_count
            - eligible_for_stamp_prize
          properties:
            stamp_threshold:
              type: integer
              description: Configurable threshold for sponsor plus community stamps.
              example: 10
            sponsor_count:
              type: integer
              example: 6
            community_count:
              type: integer
              example: 5
            eligible_for_stamp_prize:
              type: boolean
              example: true

    ScoreboardItem:
      type: object
      required: [rank, user_id, display_name, emoji_icon, score]
      properties:
        rank:
          type: integer
          example: 1
        user_id:
          type: string
          example: kktix_hash_abc123
        display_name:
          type: string
          example: Root_User
        emoji_icon:
          type: string
          description: Emoji character shown as the user's icon.
          example: 💻
        score:
          type: integer
          example: 2500

    GetScoreboardResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required:
            - offset
            - limit
            - rank_threshold
            - frozen
            - freeze_id
            - scoring_cutoff_at
            - rankings
          properties:
            offset:
              type: integer
              example: 0
            limit:
              type: integer
              example: 50
            rank_threshold:
              type: integer
              description: Configurable top-rank threshold for rank prizes.
              example: 10
            frozen:
              type: boolean
              example: false
            freeze_id:
              type: string
              nullable: true
              description: Current freeze snapshot ID when frozen, otherwise null.
              example: freeze_20260412_01
            scoring_cutoff_at:
              type: string
              format: date-time
              nullable: true
              description: Latest event timestamp included in the frozen score snapshot, or null for live scores.
              example: '2026-04-12T15:00:00Z'
            rankings:
              type: array
              items:
                $ref: '#/components/schemas/ScoreboardItem'

    GetMyPrizeResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required: [scoreboard_frozen, stamp_prize, rank_prize]
          properties:
            scoreboard_frozen:
              type: boolean
              enum: [true]
            stamp_prize:
              type: boolean
              description: Whether the user won the stamp prize.
              example: true
            rank_prize:
              type: boolean
              description: Whether the user won the rank prize.
              example: true
            rank:
              type: integer
              nullable: true
              example: 7

    ScoreboardFreezeState:
      type: string
      enum: [OPEN, FREEZING, FROZEN]

    GetScoreboardStatusResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required:
            - state
            - freeze_id
            - freeze_started_at
            - frozen_at
            - scoring_cutoff_at
            - freeze_timeout_seconds
            - freezing_stale
          properties:
            state:
              $ref: '#/components/schemas/ScoreboardFreezeState'
            freeze_id:
              type: string
              nullable: true
              description: Current freeze snapshot ID, or null when scoring is open.
              example: freeze_20260412_01
            freeze_started_at:
              type: string
              format: date-time
              nullable: true
              description: Time the current freeze calculation started.
              example: '2026-04-12T15:00:00Z'
            frozen_at:
              type: string
              format: date-time
              nullable: true
              description: Time the scoreboard reached FROZEN state.
              example: '2026-04-12T15:01:12Z'
            scoring_cutoff_at:
              type: string
              format: date-time
              nullable: true
              description: Latest event timestamp included in the current freeze snapshot, or null when no freeze snapshot exists.
              example: '2026-04-12T15:00:00Z'
            freeze_timeout_seconds:
              type: integer
              description: Configured timeout before FREEZING is considered stale.
              example: 30
            freezing_stale:
              type: boolean
              description: Whether the current FREEZING state has exceeded the timeout.
              example: false

    FreezeScoreboardRequest:
      type: object
      additionalProperties: false
      properties:
        scoring_cutoff_at:
          type: string
          format: date-time
          description: |
            Latest event timestamp included in the score and prize snapshot. If
            omitted, the server uses its current time. Must not be later than
            the server time when the freeze begins.
          example: '2026-04-12T15:00:00Z'

    FreezeScoreboardResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          required:
            - frozen
            - freeze_id
            - scoring_cutoff_at
            - frozen_at
            - stamp_threshold
            - rank_threshold
          properties:
            frozen:
              type: boolean
              enum: [true]
            freeze_id:
              type: string
              description: Stored score and prize snapshot ID.
              example: freeze_20260412_01
            scoring_cutoff_at:
              type: string
              format: date-time
              description: Latest event timestamp included in the score and prize snapshot.
              example: '2026-04-12T15:00:00Z'
            frozen_at:
              type: string
              format: date-time
              description: Time the scoreboard reached FROZEN state.
              example: '2026-04-12T15:01:12Z'
            stamp_threshold:
              type: integer
              example: 10
            rank_threshold:
              type: integer
              example: 10

  examples:
    GetMyProfileResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_abc123
          display_name: Hacker_Aries
          role: ATTENDEE
          emoji_icon: 🐱
          bio: I love reverse engineering.
          pixel_avatar_base64: iVBORw0KGgoAAAANSU...
          profile_version: 3
          collection_version: 12
          physical_id: '04:1A:2B:3C:4D:5E:6F'
          nfc_tag_key: a1b2c3d4e5f6
          collection:
            - kktix_hash_def456

    GetMyUnpairedProfileResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_new_user
          display_name: Player_new_user
          role: ATTENDEE
          emoji_icon: 🙂
          bio: ''
          pixel_avatar_base64: ''
          profile_version: 1
          collection_version: 0
          physical_id: null
          nfc_tag_key: 001122334455
          collection: []

    GetMyBootstrapResponse:
      value:
        status: success
        data:
          me:
            user_id: kktix_hash_abc123
            display_name: Hacker_Aries
            role: ATTENDEE
            emoji_icon: 🐱
            bio: I love reverse engineering.
            pixel_avatar_base64: iVBORw0KGgoAAAANSU...
            profile_version: 3
            collection_version: 12
            physical_id: '04:1A:2B:3C:4D:5E:6F'
            nfc_tag_key: a1b2c3d4e5f6
            collection:
              - kktix_hash_def456
          collected_users:
            - user_id: kktix_hash_def456
              display_name: Plant_Lover
              role: COMMUNITY
              emoji_icon: 🌱
              bio: Ask me about community projects.
              pixel_avatar_base64: iVBORw0KGgoAAAANSU...
              profile_version: 2
              collection_version: 5

    UpdateMyProfileRequest:
      value:
        display_name: Aries_The_Great
        emoji_icon: 🚀
        bio: Updated bio.
        pixel_avatar_base64: iVBORw0KGgo...

    BatchGetUsersRequest:
      value:
        users:
          - user_id: kktix_hash_def456
            profile_version: 2
            collection_version: 5
          - user_id: kktix_hash_ctf
            profile_version: 1

    BatchGetUsersResponse:
      value:
        status: success
        data:
          results:
            - user_id: kktix_hash_def456
              unchanged: true
            - user_id: kktix_hash_ctf
              unchanged: false
              data:
                user_id: kktix_hash_ctf
                display_name: CTF_Player
                emoji_icon: 🐱

    GetPartialUserProfileResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_def456
          display_name: Alice
          emoji_icon: 😉

    GetFullUserProfileResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_def456
          display_name: Plant_Lover
          role: COMMUNITY
          emoji_icon: 🌱
          bio: Ask me about community projects.
          pixel_avatar_base64: iVBORw0KGgoAAAANSU...
          profile_version: 2
          collection_version: 5

    GetUnchangedUserResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_def456
          unchanged: true

    GetUserCollectionResponse:
      value:
        status: success
        data:
          user_id: kktix_hash_def456
          collection_version: 5
          users:
            - user_id: kktix_hash_ctf
              display_name: CTF_Player
              emoji_icon: 🐱
            - user_id: kktix_hash_root
              display_name: Root_User
              role: STAFF
              emoji_icon: 💻
              bio: Root shell collector.
              pixel_avatar_base64: iVBORw0KGgoAAAANSU...
              profile_version: 4
              collection_version: 10

    PairTagRequest:
      value:
        physical_id: '04:1A:2B:3C:4D:5E:6F'

    ReplaceUserTagRequest:
      value:
        user_id: kktix_hash_abc123
        new_physical_id: '04:FE:DC:BA:98:76:54'

    ScanCollectionRequest:
      value:
        user_id: kktix_hash_def456
        physical_id: '04:99:88:77:66:55:44'

    ScanCollectionResponse:
      value:
        status: success
        data:
          collected_user_id: kktix_hash_def456
          first_time_collected: true
          profile:
            user_id: kktix_hash_def456
            display_name: Plant_Lover
            role: COMMUNITY
            emoji_icon: 🌱
            bio: Ask me about community projects.
            pixel_avatar_base64: iVBORw0KGgoAAAANSU...
            profile_version: 2
            collection_version: 5

