# Local dev — `docker compose up` from Backend/api/.
#
# - Code is bind-mounted, so edits hot-reload via wrangler dev.
# - node_modules and .wrangler/ live in named volumes (faster on Linux,
#   and isolates Linux-container artefacts from a host install).
# - The container runs as the host user (UID/GID) so files it writes
#   (e.g. drizzle-generated migrations) don't end up root-owned.
#
# Override the user with: `UID=$(id -u) GID=$(id -g) docker compose up`
# (compose v2 picks these up automatically from the shell env).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    environment:
      # Wrangler caches workerd / pnpm caches under HOME — make sure the
      # non-root user has a writable home inside the named volumes.
      HOME: /app/.docker-home
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - wrangler-state:/app/.wrangler
      - docker-home:/app/.docker-home
    ports:
      - "8787:8787"
    command: >
      sh -c "
        pnpm install --prefer-offline &&
        pnpm db:generate &&
        pnpm db:migrate:local &&
        pnpm exec wrangler dev --ip 0.0.0.0 --port 8787
      "

volumes:
  node-modules:
  wrangler-state:
  docker-home:
