name: Backend Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/nfc-battle-api-server

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Backend/nfc-battle-api-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Apply remote D1 migrations
        run: npx wrangler d1 migrations apply nfc-battle-api-server --remote

      - name: Sync JWT secret
        run: printf '%s' "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET

      - name: Sync staff danger token
        run: printf '%s' "${{ secrets.STAFF_DANGER_TOKEN }}" | npx wrangler secret put STAFF_DANGER_TOKEN

      - name: Deploy Worker
        run: npm run deploy
