name: Backend CI

on:
  push:
    paths:
      - "Backend/nfc-battle-api-server/**"
      - "Backend/openapi.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "Backend/nfc-battle-api-server/**"
      - "Backend/openapi.yaml"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Test Worker backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/nfc-battle-api-server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Backend/nfc-battle-api-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck
